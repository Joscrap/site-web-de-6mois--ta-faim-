{% extends "base.html" %}

{% block content %}
    <!-- Ici on code -->
    <div class="flex items-center justify-center pt-18 pb-40" >
        <form method="POST" action="{{ url_for('nouvelle_annonce')}}" enctype="multipart/form-data" class="p-9 rounded bg-white/60 border border-white/40 rounded-3xl shadow-lg">

            <h2 class="text-5xl text-center">Ajouter un plat</h2>
            <p class="text-center text-xs pb-10">Ajouter le plat que vous voulez sur le site</p>

            <!--Les inputs-->
            <label>
                <input name="titre" type="text" placeholder="Titre de l'annonce" class="min-w-[260px] border-none p-2 leading-tight appearance-none focus:outline-none ">
                <hr class="border-0 h-[1px] bg-gray-400">
            </label>
            
            <label>
                <input name="description" type="text" placeholder="Description de l'annonce" class="min-w-[260px] border-none p-2 leading-tight appearance-none focus:outline-none">
                <hr class="border-0 h-[1px] bg-gray-400">
            </label>
            
            <label class="p-2">
                <select name="categorie" class="min-w-[320px] rounded-xl border p-2 border-[#787672]">
                    {% for cat in categories %}
                        <option value="{{ cat.nom }}">{{ cat.nom }}</option>
                    {% endfor %}
                </select>
                <hr class="border-0 h-[1px] bg-gray-400">
            </label>


            <div class="border-none p-2">

                <input id="image" name="image" type="file" accept="image/*" class="hidden">
                <label for="image" class="justify-center w-full cursor-pointer rounded-xl text-[#787672] ">
                    Ajouter une image
                </label>

                <p id="fileName" class="text-sm"></p>

                <script>
                    document.getElementById("image").addEventListener("change", function() {
                    const fileName = this.files[0]?.name || "";
                    document.getElementById("fileName").textContent = fileName;
                    });
                </script>

            </div>

            <hr class="border-0 h-[1px] bg-gray-400">
            
            <!-- Message d'erreur-->
            {% if erreur %}
            <p class="text-red-700 text-center text-lg pt-2"><strong>Erreur :</strong> {{erreur}}</p>
            {% endif %}

            <!--LE BOUTON-->
            <div class="flex justify-center mt-6">
                <button type="submit" class="bg-red-400 py-1 rounded-xl text-white font-bold cursor-pointer hover:bg-red-800 px-18 hover:shadow-2xl hover:-translate-y-1 transition-all duration-300">
                    Ajouter
                </button>
            </div>

        </form>
    </div>

{% endblock %}
